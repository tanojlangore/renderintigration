services:
  - type: web
    name: vakilai-backend
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: node server.mjs
    healthCheckPath: /api/health
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 5000

      - key: FRONTEND_URL
        value: https://vakilai-platform.vercel.app

      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      - key: SAMBANOVA_API_KEY
        sync: false

      - key: SAMBANOVA_MODEL
        value: Meta-Llama-3.3-70B-Instruct

      - key: RAZORPAY_KEY_ID
        sync: false

      - key: RAZORPAY_KEY_SECRET
        sync: false
